<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato Basico</title>
</head>
<body>
    <h1>Informações de Contato</h1>
    <!-- Criar um formulário para que usuario enviem mensagem a um site ou empresa
     Elemento que devem ser usados:
     campo para nome de usuario
     Campo de email
     Area para mensagem longas
     Todos os campos devem ser obrigatórios
     botoes de envio e cancelamento-->
     <form action="/enviar" method="post">
            <legend>Informações pessoais:</legend>
                <label for="nome">Nome de usuario: </label>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required><br>
                <label for="email">E-mail: </label>
                <input type="text" name="email" id="name" placeholder="Digite seu e-mail" required><br>
                <label for="mensagem">Mensagem:</label><br>
                <textarea name="mensagem" id="mensagem" rows="5" cols="30"
                placeholder="Digite seu texto" required></textarea>
        <br>
        <button type="submit">Enviar</button>
        <button type="reset">Calcelar</button>
       
     </form>
</body>
</html>
