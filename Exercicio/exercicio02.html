<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de usuario</title>
</head>
<body>
    <h1>Formulário de Cadastro de Usuário</h1>
    <form action="/enviar" method="post">
        <fieldset>
            <legend>Usuário</legend>
                <label for="nome">Nome do usuario: </label>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required><br>
                <label for="emil">E-mail:</label>
                <input type="email" nome="email" id="email" placeholder="Digite seu e-mail" required><br>
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" placeholder="Digite uma senha de no mínimo 8 caracteres" required><br>
                <label for="date">Data de Nascimento: </label>
                <input type="date" name="nascimento" id="nascimento" placeholder="Digite sua data de nascimento" required><br>
        </fieldset>
        <button  type="reset">Cancelar</button>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
