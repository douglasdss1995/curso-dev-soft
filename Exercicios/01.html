<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<!--Formulário de Contato Básico-->
<!--Objetivo: Criar um formulário para que usuários-->
<!--enviem mensagens a um site ou empresa.-->


<form action="/enviar" method="post">
    <!--Campos vão aqui---->
    <h1> Formulário de contato básico</h1>
    <fieldset>
        <legend><h3>Dados pessoais</h3></legend>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br>
        <label for="sobrenome">Sobrenome:</label>
        <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome" required><br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" value="" required><br>
    </fieldset>
    <fieldset>
        <legend><h3>Mensagem</h3></legend>

        <label for="message"></label>
        <textarea id="message" name="message" rows="15" cols="30"
                  placeholder="Digite sua mensagem..." required></textarea><br>

    </fieldset>

    <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>



</form>


</body>
</html>
