<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/enviar" method="post">
  <h1>Formulário de Cadastro de Usuário</h1>

  <fieldset>
    <legend><h3>Dados pessoais</h3></legend>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br>
    <label for="sobrenome">Sobrenome:</label>
    <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome" required><br>
    <label for="nascimento">Nascimento:</label>
    <input type="date" id="nascimento" name="nascimento" placeholder="Digite sua data de nascimento" value=""><br>
  </fieldset>
<fieldset>
  <legend><h3>Informações de login</h3></legend>
  <label for="email">E-mail:</label>
  <input type="email" id="email" name="email" placeholder="Digite seu e-mail" value="" required><br>
  <label for="senha">Senha:</label>
  <input type="password" id="senha" name="senha" placeholder="Digite sua senha" value=""><br>
</fieldset>

  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>









</form>
</body>
</html>
