<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/enviar" method="post">
    <h2>Formulário de Login</h2>
    <fieldset>
        <legend><strong>Informações do usuário</strong></legend>
        <label for="nome"><strong>Nome do usuário:</strong></label>
        <input type="text" id="nome" name="nome" placeholder="Digite o nome de usuário..." required><br>
        <label for="senha"><strong>Senha:</strong></label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha..." value="" required><br>
    </fieldset>
    <button type="submit">ENVIAR</button>
    <button type="reset">CANCELAR</button>
</form>
</body>
</html>
