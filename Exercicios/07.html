<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/enviar" method="post">
    <h2><strong>Formulário de Inscrição em Newsletter</strong></h2>
    <fieldset>
        <legend><strong>Inscreva-se na nossa Newsletter</strong></legend>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" value="" required><br>
        <label for="aceite">Você aceita receber nossa newsletter ?</label>
        <input type="checkbox" id="aceite" name="aceite" value=""><br>
    </fieldset>
    <button type="submit">ENVIO</button>
    <button type="reset">CANCELAR</button>
</form>
</body>
</html>
