<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2><strong>Formulário de Reserva de Restaurante</strong></h2>
  <fieldset>
    <legend> <strong>Reserva de mesa</strong></legend>
    <label for="nome"><strong>Nome:</strong></label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br>
    <label><strong>Número de pessoas</strong></label>
    <select name="pessoas" required>
      <option value="pessoa"></option>
      <option value="pessoa1">1</option>
      <option value="pessoa2">2</option>
      <option value="pessoa3">3</option>
      <option value="pessoa4">4</option>
      <option value="pessoa5">5</option>
      <option value="pessoa6">6</option>
      <option value="pessoa7">7</option>
      <option value="pessoa8">8</option>
      <option value="pessoa9">9</option>
      <option value="pessoa10">10</option>
    </select><br>
    <label for="data"><strong>Selecione a data da reserva</strong></label>
    <input type="date" id="data" name="data" value="" required><br>
    <label for="horario"><strong>Selecione o horário da reserva</strong></label>
    <input type="time" id="horario" name="horario" value="" required><br>

    <label> <strong>Unidade:</strong>
      <select name="unidade">
        <option value="vazio"></option>
        <option value="am">Amazonas Shopping</option>
        <option value="ma">Manauara Shopping</option>
        <option value="su">Sumauma Shopping</option>
      </select></label><br>
  </fieldset>

</body>
</html>
