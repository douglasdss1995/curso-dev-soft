<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Cadastro de Usuario</h1>

<form action="">
    <fieldset>
        <legend>Cadastro de Login</legend>
        <label for="User">Nome</label>
        <input type="text" id="User" placeholder="Digite seu usuario" required><br>

        <label for="Email">Email</label>
        <input type="email" id="Email" placeholder="Digite seu email" required><br>

        <label for="Senha">Senha</label>
        <input type="text" id="Senha" placeholder="Digite sua senha" required>
    </fieldset>


    <fieldset>
        <label for="descrição">Descreva você: </label><br>
        <textarea id="descrição" cols="60" rows="5" placeholder="Digite aqui" required></textarea><br>
    </fieldset>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>

</form>


</body>
</html>
