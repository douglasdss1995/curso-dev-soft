<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Cadastro de Usuario</h1>

<form action="">
  <fieldset>
    <legend>Confirmação de Usuario</legend>
    <label for="User">Usuario:</label>
    <input type="text" id="User" placeholder="Digite seu usuario" required><br>

    <div>
      <label for="Senha">Senha:</label>
      <input type="text" id="Senha" placeholder="Digite sua senha" required>
    </div>

  </fieldset>


  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>

</form>
</body>
</html>
