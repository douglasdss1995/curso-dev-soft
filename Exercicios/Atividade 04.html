<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

  <h1>Feedback</h1>

  <form action="">

   <fieldset>
     <legend><strong>Feedback</strong></legend>
     <label for="int"><strong>Sua nota:</strong></label><br>
        <input type="range" id="int" min="0" max="10" placeholder="Digite o numero" required><br>

        <label for="textarea"><strong>Feedback:</strong></label><br>
        <textarea name="feedback" id="textarea" cols="30" rows="10" required>escreva seu feedback</textarea>
   </fieldset>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
  </form>
</body>
</html>
