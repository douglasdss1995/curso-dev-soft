<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Compras</h1>

<form action="">

  <fieldset>
    <legend><strong>Finalize sua compra</strong></legend>
    <label for="produtos"><strong>Escolha seu produto:</strong></label><br>
    <select name="produtos" id="produtos" required>
      <option value="produto1">Produto 01</option>
      <option value="produto2">Produto 02</option>
      <option value="produto3">Produto 03</option>
      <option value="produto4">Produto 04</option>
      <option value="produto5">Produto 05</option>
    </select><br>

    <label for="int"><strong>Quantidade:</strong></label><br>
    <input type="range" id="int" min="0" max="100"  required><br>

  </fieldset>

  <button type="submit">Enviar</button>
  <button type="reset">Cancelar</button>
</form>

</body>
</html>
