<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Clinica MDS</h1>

<form action="">
  <fieldset>
    <legend><strong>Agendamento Online:</strong></legend>
    <label for="date">Data do agendamento:</label>
    <input type="date" id="date" placeholder="Informe a data do agendamento" required><br>

    <div>
      <label for="hora">Hora do agendamento:</label>
      <input type="time" id="hora" placeholder="Informe a hora do agendamento" required>
    </div>

  </fieldset>


  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>

</form>

</body>
</html>
