<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>MDS</h1>

<form action="">
  <fieldset>
    <legend><strong>Dados pessoais:</strong></legend>
    <label for="email"><strong>Email</strong>:</label>
    <input type="email" id="email" placeholder="Informe seu email" required><br>

    <div>
      <h4>Você aceita receber novidade:</h4>
      <label for="sim">Sim</label>
      <input type="radio"  id="sim" name="decision" value="sim">
      <label for="nao">Não</label>
      <input type="radio"  id="nao" name="decision" value="nao">
    </div>

  </fieldset>


  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>

</form>

</body>
</html>
