<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Reserva MDS</h1>

<form action="">
  <fieldset>
    <legend><strong>Reserva de mesas:</strong></legend>
    <label for="quantidade"><strong>Informe o número de pessoas de 1 a 10</strong>:</label><br>
    <input type="range" min="1" max="10" id="quantidade" required><br>

    <div>
      <label for="obs"><strong>Observações:</strong></label><br>
      <textarea name="Observação" id="obs" cols="30" rows="10" required>Digite sua observação para reserva</textarea>
    </div>

  </fieldset>


  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>

</form>

</body>
</html>
