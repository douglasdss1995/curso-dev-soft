<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Feedback MDS</h1>

<form action="">
  <fieldset>
    <legend>Seu feedback</legend>
      <h4>Informe sua opção:</h4>
      <label for="sugestao" >Sugestão</label>
      <input type="radio"  id="sugestao" name="decision" value="sugestao" required>
      <label for="reclamacao">Reclamação</label>
      <input type="radio"  id="reclamacao" name="decision" value="reclamacao" required>

    <div>
      <label for="obs"><strong>Observações:</strong></label><br>
      <textarea name="Observação" id="obs" cols="30" rows="10" required>Digite sua observação</textarea>
    </div>

  </fieldset>


  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>

</form>

</body>
</html>
