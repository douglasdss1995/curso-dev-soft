<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unidades de Medidas</title>
    <style>
        * {
            color: #05e309;
        }
        #altura{
            transition: color;
        }
        #altura:hover{
            color: #460283;
        }
    </style>
</head>
<body>
<div class="absolutas">
    <p style="font-size: 20px">Unidade em Pixel/px</p>
    <p style="font-size: 1cm">Unidade em Centímetro/cm</p>
    <p style="font-size: 10mm">Unidade em Milímetro//mm</p>
    <p id="altura" style="font-size: 0.5in">Unidade em Polegada/in</p>
    <p style="font-size: 20pt">Unidade em Ponto Tipográfico/pt</p>
</div>
<div class="relativas">
    <p style="font-size: 1em">Unidade baseado no elemento pai</p>
    <p style="font-size: 1rem">Unidade baseado no elemento root</p>
    <p style="font-size: 1vw"> Unidade baseado largura</p>
    <p style="font-size: 1vh">Unidade baseado altura</p>
</div>
</body>
</html>
