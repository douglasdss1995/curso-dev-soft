<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 01 - Formulario com Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
        <h1>Cadastro de Usuário</h1>
        <div class="row">
            <div class="row">
                <div class="col-md-6 col-lg-4">
                    <label for="exampleFormControlInput1" class="form-label">Nome completo:</label>
                    <input type="text" class="form-control" id="nome" placeholder="digite seu nome">
                </div>
                <div class="col-md-6 col-lg-4">
                    <label for="exampleFormControlInput1" class="form-label">E-mail:</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com">
                </div>
                <div class="col-md-6 col-lg-4">
                    <label for="exampleFormControlInput1" class="form-label">Senha:</label>
                    <input type="password" class="form-control" id="senha" placeholder="digite sua senha">
                </div>
                <div class="col-md-6 col-lg-4">
                    <label for="exampleFormControlInput1" class="form-label">Confirmar senha:</label>
                    <input type="password" class="form-control" id="confirmar-senha" placeholder="Confirme sua senha">
                </div>
                <div class="col-md-6 col-lg-4">
                    <label for="exampleFormControlInput1" class="form-label">Data de nascimento</label>
                    <input type="date" class="form-control" id="dt-nascto" placeholder="data de nascimento">
                </div>
            </div>
            <div class="col-sm-12">
                <label for="exampleFormControlInput1" class="form-label">Endereço:</label>
                <input type="email" class="form-control" id="end" placeholder="endereço">
            </div>
        </div>
        <div class="d-flex flex-row-reverse" >
            <button type="button" class="btn btn-success">Confirmar</button>
            <button type="button" class="btn btn-dark">Cancelar</button>
        </div>
    </div>
</body>
</html>
