<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

    <link rel="stylesheet" href="exercicio_01.css">

  <style>
    button{
      margin: 3px;
    }
  </style>

</head>
<body>

<caption><h1>Formulário de Cadastro de Usuário</h1></caption>
<div class="container-fluid">
    <div class="row">
        <div class="row">
            <div class="col-md-6 col-lg-4">
                <label for="name" class="form-label">Nome completo:</label><br>
                <input type="text" class="form-control" id="name" placeholder="Digite seu nome completo" required>
            </div>

            <div class="col-md-6 col-lg-4">
                <label for="exampleFormControlInput1" class="form-label">E-mail:</label><br>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="exemplo@email.com">
            </div>

            <div class="col-md-6 col-lg-4">
                <label for="password" class="form-label">Senha:</label><br>
                <input type="password" class="form-control" id="password" placeholder="Crie sua senha" required>
            </div>

            <div class="col-md-6 col-lg-4">
                <label for="confirmação" class="form-label">Confirmação de senha:</label><br>
                <input type="password" class="form-control" id="confirmação" placeholder="Repita sua senha" required>
            </div>

            <div class="col-md-6 col-lg-4">
                <label for="nascimento" class="form-label">Data de Nascimento</label><br>
                <input type="date" class="form-control" id="nascimento" placeholder="Repita sua senha" required>
            </div>
        </div>

        <div class="col">
            <label for="exampleFormControlTextarea1" class="form-label">Endereço</label><br>
            <textarea class="form-control" id="exampleFormControlTextarea1" placeholder="Endereço" rows="3"></textarea>
        </div>

        <div class="d-flex justify-content-end">
            <button type="button" class="btn btn-dark">Cancelar</button>
            <button type="button" class="btn btn-success">Enviar</button>
        </div>
    </div>
</div>

</body>
</html>
