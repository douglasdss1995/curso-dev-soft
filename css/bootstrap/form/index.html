<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="row">
            <div class="col-md-6 col-lg-4">
                <label for="nome" class="form-label">Nome:</label>
                <label for="nome"></label><input type="text" class="form-control" id="nome"
                                                 placeholder="Digite seu nome">
            </div>
        </div>
        <div class="col-md-6 col-lg-4">
            <label for="email" class="form-label">Email:</label>
            <label for="email"></label><label for="email"></label><input type="email" class="form-control"
                                                                         id="email"
                                                                         placeholder="name@example.com">
        </div>
        <div class="col-md-6 col-lg-4">
            <label for="senha" class="form-label">Senha:</label>
            <label for="senha"></label><label for="senha"></label><input type="password" class="form-control"
                                                                         id="senha"
                                                                         placeholder="digite sua senha">
        </div>
        <div class="col-md-6 col-lg-4">
            <label for="confirmar-senha" class="form-label">Confirme a Senha:</label>
            <label for="confirmar-senha"></label><label
                for="confirmar-senha"></label><label for="confirmar-senha"></label><input
                type="password"
                class="form-control"
                id="confirmar-senha"
                placeholder="confirme sua senha">
        </div>
    </div>

    <div class="col-sm-12">
        <label for="exampleFormControlTextarea1" class="form-label">Example textarea:</label>
        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
    </div>
</div>

<button type="submit">Enviar</button>
<button type="reset">Cancelar</button>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</body>
</html>
