<!DOCTYPE html>
<html lang="pt-BR">

    <title>Caixa de Dialogo</title>
    <link rel="stylesheet" href="caixa-de-dialogo.css">
</head>
<body>
    <div class="container">
        <div class="caixa-de-dialogo">
            <div class="titulo">O que é Lorem Ipsu?</div>
            <div class="corpo">
                Lorem Ipsum é simplesmente uma <a href="a">simulação</a> de um 
                text of the printing and typesetting industry. Lorem Ipsum has been 
                the industry's standard dummy text ever since the 1500s, when an unknown
                 printer took a galley of type and scrambled it to make a type specimen 
                 book. 
                   <br>
            </div>
            <div class="img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Angular_full_color_logo.svg/1280px-Angular_full_color_logo.svg.png" alt=""/>
           <div class="rodape">
                <button type="reset">Cancelar</button>
                <button type="submit">Confirmar</button>
            </div>
        </div>

    </div>
</body>
</html>
