<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined">

    <style>
        .cor-rgb {
            color: rgb(0, 255, 174);
        }

        .cor-rgb {
            color: rgb(0, 255, 119);
        }

        .icon {
            font-size: 50px;
            margin: 30px;
            transition: transform 0.5s;
        }

        .icon:hover {
            transform: scale(1.2);
        }

        .icon:hover {
            transform: scale(3) rotateX(300deg);
        }
    </style>

</head>
<body>

<i class="material-icons outlined icon cor-rgb">settings</i>
<i class="material-icons outlined icon cor-rgb">settings</i>


</body>
</html>
