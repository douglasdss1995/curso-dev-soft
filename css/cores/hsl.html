<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined">

    <style>
        .cor-hsl {
            color: hsl(260, 60%, 65%);
        }

        .cor-hsla {
            color:rgba(148, 112, 219, 0.496);
        }

        .icon {
            font-size: 50px;
            margin: 30px;
            transition: transform 0.5s;
        }

        .icon:hover {
            transform: scale(1.2);
        }
    </style>

</head>

<body>

    <i class="material-icons-outlined icon cor-hsl">settings</i>
    <i class="material-icons-outlined icon cor-hsla">settings</i>

</body>

</html>
