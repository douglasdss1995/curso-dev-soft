<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined">

    <style>
        .icon {
            font-size: 50px;
            margin: 30px;
            transition: transform 0.5s;
        }
        .cor-hsl{
            color: hsl(260, 60%, 65%);
        }
        .cor-hsla{
            color: hsla(260, 60%, 65%, 1);
        }
        .icon:hover {
            transform: scale(1.2);
        }
    </style>

</head>
<body>

<i class="material-icons-outlined icon cor-hsl" >settings</i>
<i class="material-icons-outlined icon cor-hsla" >settings</i>

</body>
</html>
