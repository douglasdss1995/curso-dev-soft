<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RGB</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined">

    <style>
        .icon {
            font-size: 50px;
            margin: 30px;
            transition: transform 0.5s;
        }

        .cor-rgb {
            color: rgb(147, 112, 219);
        }

        .cor-rgba {
            color: rgba(147, 112, 219, 1);
        }

        .icon:hover {
            transform: scale(2);
        }


    </style>

</head>
<body>

<i class="material-icons-outlined icon cor-rgb">settings</i>
<i class="material-icons-outlined icon cor-rgba">settings</i>


</body>
</html>
