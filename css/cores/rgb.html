<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">

    <style>
        .cor-rgb {
            font-size: 50px;
            margin: 30px;
            transition: transform 0.2s;
            color: rgb(147, 112, 219);
        }

        .cor-rgba {
            font-size: 50px;
            margin: 30px;
            transition: transform 0.2s;
            color: rgba(147, 112, 219, 0.5);
        }

        .icon:hover {
            transform: scale(3);
        }

    </style>
</head>
<body>

<i class="material-icons-outlined icon cor-rgb">settings</i>
<i class="material-icons-outlined icon cor-rgba">settings</i>


</body>
</html>
