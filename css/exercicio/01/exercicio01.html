<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <style>
        button {
            margin: 10px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <h1>Formulário de cadastro de usuário</h1>
    <div class="row">
        <div class="row">
            <div class="col-md-6 col-lg-4">
                <label for="name" class="form-label"><strong>Nome completo:</strong></label>
                <input type="text" class="form-control" id="name" placeholder="Digite seu nome completo">
            </div>
            <div class="col-md-6 col-lg-4">
                <label for="email" class="form-label"><strong>E-mail:</strong></label>
                <input type="email" class="form-control" id="email" placeholder="exemplo@email.com" value="">
            </div>
            <div class="col-md-6 col-lg-4">
                <label for="senha" class="form-label"><strong>Senha:</strong></label>
                <input type="password" class="form-control" id="senha" placeholder="Crie sua senha">
            </div>
            <div class="col-md-6 col-lg-4">
                <label for="confirm" class="form-label"><strong>Confirmação de senha:</strong></label>
                <input type="password" class="form-control" id="confirm" placeholder="Repita sua senha">
            </div>
        </div>
        <div class="md-6 col-lg-4">
            <label for="nascimento" class="form-label"><strong>Data de nascimento:</strong></label>
            <input type="date" class="form-control" id="nascimento">
        </div>
        <div class="col">
            <label for="Textarea" class="form-label"><strong>Endereço:</strong></label>
            <textarea class="form-control" id="Textarea" rows="3">Endereço</textarea>
        </div>
    </div>
</div>


<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-success">Cadastrar</button>
    <button type="button" class="btn btn-dark">Cancelar</button>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</body>
</html>
