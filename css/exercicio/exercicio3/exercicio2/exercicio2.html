<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tabela de Produtos</title>
    <link rel="stylesheet" href="exercicio2.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
<div>
    <h2>Tabela de Produtos</h2>

</div>
<div class="container">
    <table>

        <thead>
        <tr>
            <th rowspan="2">Nome do Produto</th>
            <th colspan="4" class="categoria">Categoria</th>
            <th rowspan="2">Preço</th>

        </tr>

        </thead>

        <tr>
            <td>Notebook Dell</td>
            <td>Eletronicos</td>
            <td>R$ 3.500</td>

        </tr>

        <tr>

            <td>Camiseta</td>
            <td>Vestuário</td>
            <td>R$ 45,00</td>

        </tr>
        <tr>

            <td>Caneca Personalizada</td>
            <td>Decoração</td>
            <td>R$ 25,00</td>

        </tr>

    </table>
</div>
</body>
</html>
