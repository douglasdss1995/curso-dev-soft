<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

    <style>
        *label{
            font-weight: bold;
        }
        #cancel {
            border-radius: 0.3rem;
            background-color: black;
            color: white;
            margin: 0.5rem;
            padding: 3px 5px 3px 5px;
        }

        #cadastro {
            border-radius: 0.3rem;
            background-color: #008100;
            color: white;
            margin: 0.5rem;
            padding: 3px 5px 3px 5px;
        }
    </style>

</head>
<body>
<div class="container">
    <div class="titulo"><h1>Formulário de Cadastro de Usuário</h1></div>
    <div class="row">
        <div class="row">
            <div id="texto" class="col-sm-6 col-md-6">
                <label for="username" class="form-label">Nome completo: </label>
                <input type="text" name="username" class="form-control" id="username"
                       placeholder="Digite seu nome completo">
            </div>
            <div id="e-mail" class="col-md-6">
                <label for="email" class="form-label">E-mail: </label>
                <input type="email" name="email" class="form-control" id="email" placeholder="exemplo@gmail.com">
            </div>
            <div id="senha" class="col-md-6">
                <label for="password" class="form-label">Senha: </label>
                <input type="password" name="password" class="form-control" id="password" placeholder="Crie sua senha">
            </div>
            <div id="senharepetida" class="col-md-6">
                <label for="rpassword" class="form-label">Confirmação de senha: </label>
                <input type="password" name="password" class="form-control" id="rpassword"
                       placeholder="Repita sua senha">
            </div>
            <div id="data" class="col-md-6">
                <label for="date" class="form-label">Data de Nascimento: </label>
                <input type="date" name="date" class="form-control" id="date">
            </div>
            <div id="local" class="col-12">
                <label for="endereço" class="form-label">Endereço: </label>
                <textarea class="form-control" id="endereço" rows="3" placeholder="Endereço "></textarea>
            </div>
        </div>
    </div>
    <div class="d-flex justify-content-end">
        <div class="botões">
            <button id="cancel" type="reset">Cancelar</button>
            <button id="cadastro" type="submit">Cadastrar</button>
        </div>
    </div>
</body>
</html>
