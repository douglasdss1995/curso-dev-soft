<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-direction</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="flex-direction.css">
</head>

<body>
    <div class="container">
        <div class="block-01">1</div>
        <div class="block-02">2</div>
        <div class="block-03">3</div>
    </div>

    <h2>flex-direction-column</h2>
    <div class="container flex-direction-column">
        <div class="block-01">1</div>
        <div class="block-02">2</div>
        <div class="block-03">3</div>
    </div>

    <h2>flex-direction-row</h2>
    <div class="container flex-direction-row">
        <div class="block-01">1</div>
        <div class="block-02">2</div>
        <div class="block-03">3</div>
    </div>

    <h2>flex-direction-column-reverse</h2>
    <div class="container flex-direction-column-reverse">
        <div class="block-01">1</div>
        <div class="block-02">2</div>
        <div class="block-03">3</div>
    </div>

    <h2>flex-direction-row-reverse</h2>
    <div class="container flex-direction-row-reverse">
        <div class="block-01">1</div>
        <div class="block-02">2</div>
        <div class="block-03">3</div>
    </div>
</body>

</html>
