<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
</head>
<body>
<div class="titulo">
    <h1>Formulario De Cadastro de Usuário</h1>
</div>
<div class="container">
    <label for="usuario"><strong>Nome Completo: </strong></label>
    <input type="text" name="usuario" id="usuario"placeholder="Digite seu nome completo">
    <label for="email"><strong>E-mail: </strong></label>
    <input type="email" name="email" id="email"placeholder="exemplo@email.com"><br>
    <label for="senha"><strong>Senha: </strong></label>
    <input type="password" name="senha" id="senha"placeholder="Crie sua senha">
    <label for="confirmaçãodesenha"><strong>Confirmação de Senha: </strong></label>
    <input type="password" name="confirmaçãodesenha" id="confirmaçãodesenha"placeholder="Repita sua senha">
</div>




</body>
</html>
