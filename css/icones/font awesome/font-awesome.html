<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>font-awesome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        i{
            font-size: 65px;
            margin: 25px;
            margin-top: 20px;
            transition: transform 1s;
        }
        i:hover{
            transform: scale(1.8);
        }
        .fa-instagram {
            color: #ff6f86;
        }
        .fa-twitter{
            color: #217ec1;
        }
        .fa-facebook{
            color: #0c09bc;
        }
        .fa-user{
            color: #4e4e5e;
        }
        .fa-check-circle{
            color: green;
        }
        .fa-exclamation-triangle{
            color: #ec0202;
        }

    </style>
</head>
<body>
<i class="class fab fa-facebook"></i><br>
<i class="class fab fa-twitter"></i><br>
<i class="class fab fa-instagram"></i><br>
<br>
<i class="class fas fa-search"></i><br>
<i class="class fas fa-user"></i><br>
<i class="class fas fa-shopping-cart"></i><br>
<br>
<i class="class fas fa-check-circle"></i><br>
<i class="class fas fa-exclamation-triangle"></i><br>


</body>
</html>
