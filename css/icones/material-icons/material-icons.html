<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined">
    <style>
        i {
            font-size: 50px;
            margin: 50px;
            transition: transform 0.7s;
        }

        i:hover {
            transform: scale(4);
        }

        i.cor-predefinida {
            color: mediumpurple
        }
        i.cor-rgb{color: rgb(219, 122, 171);
        } i.cor-rgba{color: rgba(219, 122, 171,1);
        }
    </style>
</head>
<body>
<i class="material-icons icon">home</i>
<i class="material-icons-outlined icon">home</i>

<i class="material-icons icon">shopping_cart_checkout</i>
<i class="material-icons-outlined icon">shopping_cart_checkout</i>
<i class="material-icons-outlined cor-predefinida">settings</i>

<i class="material-icons-outlined cor-rgb">settings</i>
<i class="material-icons-outlined cor-rgba">settings</i>



</body>
</html>
