<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pseudo-Elementos</title>
    <style>
        p::first-line {
            font-style: italic;
            font-size: 2em;
        }
    </style>
</head>
<body>
<p>
    Esta é a primeira linha<br>
    Esta é a segunda linha
</p>
</body>
</html>
