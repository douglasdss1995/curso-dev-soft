<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
    :root{
      --cor-do-texto: rgb(124, 237, 5);
      --cor-da-borda: rgb(220, 38, 45);
      --cor-do-fundo: rgb(29, 115, 202);
    }

    p{
      font-size: 3rem;
      padding: 1rem;

      color: var(--cor-do-texto);
      border: 5px solid var(--cor-da-borda);
      background-color: var(--cor-do-fundo);
    }
  </style>
</head>
<body>
<p>
  Texto da cor Verde, Fundo Azul e Borda Vermelha.
</p>
</body>
</html>
