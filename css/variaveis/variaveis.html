<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>variaveis</title>
    <style>
    :root{
        --cor-do-texto: rgb(130, 255, 0);
        --cor-da-borda: rgb(101, 1, 5);
        --cor-do-fundo: rgb(131, 190, 255);
    }
    p{
        font-size: 3rem;
        padding: 1rem;
        color: var(--cor-do-texto);
        border: 5px solid var(--cor-da-borda);
        background-color: var(--cor-do-fundo);
    }
    </style>
</head>
<body>
<p>Texto de cor verde,fundo azul e borda vermelha</p>
</body>
</html>
