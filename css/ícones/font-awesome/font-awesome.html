<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
          integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
        i {
            color: cornflowerblue;
            font-size: 50px;
            margin: 50px;
            transition: transform 0.9s;
        }

        .fa-instagram {
            color: fuchsia;
        }

        i:hover {
            transform: scale(3);
        }
    </style>
</head>
<body>

<i class="fab fa-facebook"></i>
<i class="fab fa-twitter"></i>
<i class="fab fa-instagram"></i>

<i class="fas fa-search"></i> <!--ícone de busca-->
<i class="fas fa-user"></i> <!--ícone de usuário-->
<i class="fas fa-shopping-cart"></i> <!--ícone de carrinho-->

<i class="fas fa-check-circle"></i> <!--confirmação-->
<i class="fas fa-exclamation-triangle"></i> <!--alerta-->

</body>
</html>
