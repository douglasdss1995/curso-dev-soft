<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Informações de contato </title>
</head>
<body>

<form action="/enviar" method="post">

    <fieldset>

        <legend>Informações Pessoais</legend>
         <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required ><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required ><br>

    </fieldset>

    <fieldset>
        <label for="anotacoes">Mensagem:</label><br>
        <textarea id="anotacoes" name="anotacoes" rows="5" cols="30"
                  placeholder="Digite sua anotação..." required ></textarea><br>
    </fieldset>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
    <button type="button" onclick="alert('Olá')">Clique aqui</button>

</form>
</body>
</html>
