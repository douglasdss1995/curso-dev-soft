<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Inscrição na Newsletter</title>

</head>
<body>
<h1>Formulário de Inscrição em Newsletter</h1>

<form>
    <fieldset>
        <legend>Dados para Inscrição</legend>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <input type="checkbox" id="aceite" name="aceite" required>
        <label for="aceite">Aceito receber e-mails com novidades</label>
    </fieldset>

    <br>

    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>
</form>
</body>
</html>
