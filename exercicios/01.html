<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Formulário de cadastro</h1>

<fieldset>
    <legend>Informações de Pessoais</legend>
    <form action="/enviar" method="post">
        <!--Campos aqui-->

        <label for="nome">Nome Usuário:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required=""><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" value="" required=""><br>
</fieldset>


<label for="anotacoes">Anotações</label><br>
<textarea id="anotacoes" name="anotacoes" rows="5" cols="30">
</textarea><br>

<button type="submit">Enviar</button>
<button type="reset">Cancelar</button>


</body>
</html>
