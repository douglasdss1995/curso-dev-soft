<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <h1>Formulário de Contato Básico</h1>
</head>
<body>
<fieldset>
  <legend>Informações de Login</legend>
<div>
<label for="nome">Nome de Usuário: </label><br>
<input type="text" id="name" name="name" placeholder="Digite seu Nome" value="" required><br>
<label for="email">E-mail: </label><br>
<input type="email" id="email" name="email" placeholder="Digite seu E-mail" value="" required><br>
<label for="senha">Senha: </label><br>
<input type="password"id="senha" name="senha" placeholder="Digite sua Senha" value="" required><br>

</fieldset>
</div>
<fieldset>
    <legend>Informações Pessoais</legend>
    <label for="nascimento">Data de Nascimento: </label>
    <input type="date" id="nascimento" name="nascimento" value="" required>
</fieldset>
