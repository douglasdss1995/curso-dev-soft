<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Pesquisa de Satisfação</title>
</head>
<body>
<h1>Formulário de Satisfação</h1>
<fieldset>

<label for="nota">Nota: </label><br>
<select name="Nota">
  <option value="nota">1</option>
  <option value="nota">2</option>
  <option value="nota">3</option>
  <option value="nota">4</option>
  <option value="nota">5</option>
  <option value="nota">6</option>
  <option value="nota">7</option>
  <option value="nota">8</option>
  <option value="nota">9</option>
  <option value="nota">10</option>

</select>
</fieldset>
<button type="submit">Enviar</button>
<button type="reset">Limpar</button><br>
<label for="anotacoes">Mensagem:</label><br>
<textarea id="anotacoes" name="anotacoes" rows="5" cols="30"
  placeholder="Digite sua Mensagem...">
</textarea>
</body>
</html>
