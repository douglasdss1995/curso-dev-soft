<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Doação</title>
</head>
<body>

    <h1>Formulário de Doação</h1>
    <fieldset>
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br>

        <label for="number">Valor:</label><br>
        <input type="number" id="number" name="number" min="1" placeholder="Digite Valor" value="" required><br>
   <label for="pagamento">Formas de Pagamentos</label><br>
    <select name="pagamento" id="pagamento" required>
        <option value="">Selecione </option>
        <option value="1">Débito</option>
        <option value="2">Crédito</option>
        <option value="3">Pix</option>
    </select><br>
        <button type="submit">Enviar</button>
        <button type="reset">Cancelar</button>

</fieldset>
</body>
</html>
