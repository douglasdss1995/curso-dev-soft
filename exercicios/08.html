<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Formulário de Doação</title>
</head>
<body>
<h1>Formulário de Doação</h1>
<fieldset>
  <legend>Pagamento</legend>
  <label for="valor">Valor(R$): </label>
  <select name="valor" required>
    <option value=""></option>
    <option value="valor">10</option>
    <option value="valor">20</option>
    <option value="valor">30</option>
    <option value="valor">40</option>
    <option value="valor">50</option>
    <option value="valor">60</option>
    <option value="valor">70</option>
    <option value="valor">80</option>
    <option value="valor">90</option>
    <option value="valor">100</option>
  </select><br>
  <label for="valor">Forma de Pagamento: </label>
  <select name="pagamento"required>
    <option value=""></option>
    <option value="pagamento">Dinheiro</option>
    <option value="pagamento">Pix</option>
    <option value="pagamento">Débito</option>
    <option value="pagamento">Crédito</option>

  </select>
</fieldset>
<button type="submit">Enviar</button>
<button type="reset">Cancelar</button><br>

</body>
</html>
