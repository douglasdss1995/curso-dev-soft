<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Reclamção/Sugestão</title>
</head>
<body>

<h1>Formulário de Reclamção/Sugestão</h1>
<fieldset>

    <legend>Formulário</legend>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br>

    <label for="reclamação">Reclamação:</label>
    <input type="radio" name="feedbak" id="reclamação" value="reclamação">

    <label for="sugestão">Sugestão:</label>
    <input type="radio" name="feedbak" id="sugestão" value="sugestão"><br>

    <label for="anotacoes">Mensagem</label><br>
    <textarea id="anotacoes" name="anotacoes" rows="5" cols="30">

</textarea><br>

    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>

</fieldset>
</body>
</html>
