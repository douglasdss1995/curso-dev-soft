<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário Básico</title>
</head>
<body>
<h1>Formulário Contato Básico</h1>
<form>
<fieldset>
    <label for="usuario">Usuário: </label>
    <input type="text" name="nome" id="usuario" placeholder="Digite um usuário" required><br>
    <br>
    <label for="email">E-mail:</label>
    <input type="text" name="email" id="email" placeholder="Digite seu e-mail" required><br>
</fieldset>
    <br>
    <label>Mensagem Longa:</label><br>
    <textarea name="mensagem" id="mensagem" cols="30" rows="5" placeholder="Digite sua Mensagem..."></textarea><br>

    <br>
    <button type="submit">Enviar</button>
    <button type="reset" onclick="">Cancelar</button>
</form>
</body>
</html>
