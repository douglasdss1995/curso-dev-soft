<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pesquisa de Satisfação</title>
</head>
<body>
<h2>Pesquisa de Satisfação</h2>
<form action="/enviar" method="post">
    <fieldset>
        <legend>Pesquisa de Satisfação</legend>
        <label for="nota" id> Dê a sua Nota de 1 a 10: </label>
        <select name="nota" id="nota" required>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select><br>
        <br>
        <label for="avaliacao"> Avaliação: </label><br>
        <textarea name="avaliacao" id="avaliacao" cols="30" rows="5" placeholder="Nos dê sua avaliação"
                  required></textarea><br>
    </fieldset>
</form>
<br>
<button type="submit">Enviar</button>
<button type="reset">Cancelar</button>


</body>
</html>
