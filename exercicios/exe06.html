<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agendamento</title>
</head>
<body>
<h2>Agendamento de Consulta</h2>
<form action="">
    <fieldset>
        <legend>Agendamentos Online</legend>
        <label for="dataagenda">Data: </label>
        <input type="date" id="dataagenda" name="dataagenda" value="" required><br><br>
        <label for="hora">Hora: </label>
        <input type="time" id="hora" name="hora" value="" required><br>
    </fieldset>
    <br>
    <button type="submit">Comprar</button>
    <button type="reset">Cancelar</button>

</form>

</body>
</html>
