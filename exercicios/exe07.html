<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inscrição Newsletter</title>
</head>
<body>
<h2>Formulário de Inscrição em Newsletter</h2>
<form action="/enviar" method="post">
    <fieldset>
        <legend>Inscreva-se</legend>
        <label for="email">E-mail: </label>
        <input type="email" id="email" name="email" placeholder="Digite Seu E-mail" value=""><br>
        <input type="checkbox" id="termo" name="termo" value="">
        <label for="termo">Aceito receber e-mails e promoções</label>

    </fieldset>
    <br>
    <button type="submit">Comprar</button>
    <button type="reset">Cancelar</button>
</form>

</body>
</html>
