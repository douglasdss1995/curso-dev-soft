<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuario</title>
</head>
<body bgcolor="#7fffd4">
<form>
  <fieldset>
    <legend>Cadastro de Usuario</legend>
    <label for="Name">Nome de Usuario:</label>
    <br>
    <input type="text" name="Name" id="Name" value="" placeholder="Digite seu Nome de Usuario" required><br>
    <label for="EMail">E-Mail do Usuario:</label>
    <br>
    <input type="email" name="EMail" id="EMail" value="" placeholder="Digite o E-Mail do Usuario" required><br>
    <label for="Senha">Senha do Usuario:</label>
    <br>
    <input type="password" id="Senha" name="senha" value="" placeholder="Digite a Senha do Usuario" required><br>
    <label for="Nascimento">Data de Nascimento</label>
    <br>
    <input type="date" name="nascimento" id="Nascimento" value="" required><br>
  </fieldset>
  <button type="submit">Enviar Dados</button>
  <button type="reset" >Limpar Dados</button>
</form>
</body>
</html>
