<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agendamento Online</title>
</head>
<body>
<header><h1>Agende sua Consulta Abaixo: </h1></header>
<main>
    <form action="">
        <fieldset>
            <label for="mês">Escolha o Dia da Consulta: </label>
            <input type="date" name="Mês" id="Mês" min="2025-04-29" max="2025-12-23" required><br>
          <p></p>
            <label for="hora">Escolha a Hora da Consulta: </label>
            <input type="time" id="hora" name="hora" min="07:00" max="16:00" required>
        </fieldset>
      <br>
        <button type="submit">Marcar</button>
        <button type="reset">Remarcar</button>
    </form>
</main>
</body>
</html>
