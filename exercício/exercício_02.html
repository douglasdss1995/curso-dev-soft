<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Informações de cadastro</title>
</head>
<body>
<form>
    <h1>Cadastro de Usuário</h1>
    <fieldset>
        <legend>Informações de usuário</legend>

        <label for="nome">Usuário: </label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br>

        <label for="email">E-mail: </label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required><br>

        <label for="senha">Senha: </label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha"><br>

        <label for="idade">idade: </label>
        <input type="number" id="idade" name="idade" placeholder="Digite sua idade"><br>
    </fieldset>

    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>

</form>
</body>
</html>
