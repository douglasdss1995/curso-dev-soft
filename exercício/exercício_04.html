<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="">

  <h1>Pesquisa de satisfação</h1>
  <fieldset>
    <legend>Nível de satisfação</legend>

    <label for="satisfação">Nível:</label><br>
    <input type="number" name="satisfação" id="satisfação" placeholder="" min="0" max="10"  required><br>
  </fieldset><br>

  <label for="anotacoes">Reclamações:</label><br>
  <textarea id="anotacoes" name="anotacoes" rows="5" cols="30" placeholder="reclame aqui"></textarea><br>

  <button type="submit">Enviar</button>
  <button type="reset">Cancelar</button>

</form>
</body>
</html>
