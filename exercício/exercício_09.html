<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="">
    <fieldset>
        <legend><strong>Doação</strong></legend>
        <label for="pessoas">Número de Pessoas:</label>
        <input type="number" id="pessoas" name="pessoas" value="" min="1" required><br>

        <label for="mensagem">Observações:</label><br>
        <textarea id="mensagem" name="mensagem" rows="5" cols="30" placeholder="OBSERVAÇÕES" required></textarea><br>
        <fieldset>

            <button type="submit">Reservar</button>
            <button type="reset">Cancelar</button>
</form>
</body>
</html>
