<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Informações de Contato</title>
</head>
<body>
<fieldset>

  <legend>Usuario</legend>

<form action="/enviar" method="post">

  <label for="nome">Nome: </label>
  <input type="text" id="nome" name="nome" placeholder="Digite seu nome" value=""><br>

</fieldset>

<fieldset>
  <legend>Informações</legend>
  <label for="email">Email: </label>
  <input type="email" id="email" name="email" placeholder="Digite seu email" value=""><br>

  <label for="senha">Senha: </label>
  <input type="password" id="senha" name="senha" placeholder="Digite sua senha" value="">

</fieldset>

 <label for="anotacoes">Mensagem:</label>
    <textarea id="anotacoes" name="anotacoes" rows="5" cols="30"
              placeholder="Digite sua mensagem...">
    </textarea><br>

<button type="submit">Enviar</button>
<button type="reset">Cancelar</button>
</form>
</body>
</html>
