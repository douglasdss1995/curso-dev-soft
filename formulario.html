<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <form action="/enviar" method="post">
        <!-- Campos vão aqui -->
         <fieldset>
            <legend>Informações de login</legend>

            <label for="senha">Senha: </label>
            <input type="password" name="senha" id="senha" placeholder="Digite sua senha" value=""><br>
    
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Digite seu e-mail" value=""><br>

         </fieldset>

         <fieldset>
            <legend>Informações pessoais</legend>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br>
            <!-- Os tipos de entrada INPUT-->
    
            <label for="sobrenome">Sobrenome: </label>
            <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite seu sobrenome" value=""><br>
    
            
            <label for="nascimento">nascimento: </label>
            <input type="date" name="nascimento" id="nascimento" placeholder="Digite a data de seu nascimento" value=""><br>
    
            <label for="idade">Idade: </label>
            <input type="number" name="idade" id="idade" placeholder="Digite sua idade" value=""><br>
    
            <label for="Nacionalidade">Nacionalidade: </label><br>
            <input type="radio" name="nacionalidade" id="brasileiro" value="brasileiro">
            <label for="brasileiro">Brasileiro</label><br>
            <input type="radio" name="nacionalidade" id="estrangeiro" value="estrangeiro">
            <label for="estrangeiro">Estrangeiro</label><br>
            <label>Cidade</label>
            <select name="cidade">
            <option value="am">Manaus</option>
            <option value="sp">São Paulo</option>
            <option value="ex">Exterior</option>
        </select><br>

            
         </fieldset>
        
         <fieldset>
            <legend>Informações de sistema</legend>
            <label for="usuario">Tipo de usuario:</label><br>
            <input type="checkbox" name="is_admin" id="is_admin" value="">
            <label for="is_admin">Administrador? </label><br>
    
            <input type="checkbox" name="is_admin2" id="is_admin2" value="">
            <label for="is_admin">Usuário? </label><br>
    
            <input type="checkbox" name="is_admin3" id="is_admin3" value="">
            <label for="is_admin">Estagiario? </label><br>    

         </fieldset>
        

        
        <!-- <label>Cidade</label>
        <select name="cidade" multiple>
            <option value="am">Manaus</option>
            <option value="sp">São Paulo</option>
            <option value="ex">Exterior</option>
        </select><br>
 -->
        <label for="anotações">Mensagem</label>
        <textarea name="anotacoes" id="anotacoes" rows="5" cols="30" 
        placeholder="Digite suas anotacoes"></textarea><br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
        <button type="button" onclick="alert('ola')">Clique aqui</button>

    </form>
</body>

</html>
