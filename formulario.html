<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="/enviar" method="post">
        <!-- Campos vão aqui -->
         <label for="nome">Nome</label>
         <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br>
         <!-- Os tipos de entrada INPUT-->

          <label for="sobrenome">Sobrenome: </label>
          <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite seu sobrenome" value=""><br>
          
          <label for="senha">Senha: </label>
          <input type="password" name="senha" id="senha" placeholder="Digite sua senha" value=""><br>

          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" placeholder="Digite seu e-mail" value=""><br>

          <label for="nascimento">nascimento: </label>
          <input type="date" name="nascimento" id="nascimento" placeholder="Digite a data de seu nascimento" value=""><br>

          <label for="idade">Idade: </label>
          <input type="number" name="idade" id="idade" placeholder="Digite sua idade" value=""><br>

          <label for="brasileiro">Brasileiro</label>
          <input type="radio" name="nacionalidade" id="brasileiro" value="brasileiro">
          <label for="estrangeiro">Estrangeiro</label>
          <input type="radio" name="nacionalidade" id="estrangeiro" value="estrangeiro"><br>

          <label for="is_admin">Administrador? </label>
          <input type="checkbox" name="is_admin" id="is_admin" value=""><br>

    </form>
</body>
</html>
