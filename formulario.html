<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/enviar" method="post">

    <fieldset>
        <label for="name">Nome:</label>
        <input type="text" id="name" name="nome" placeholder="Digite seu nome"><br>
    </fieldset>

    <fieldset>
        <legend>Login</legend>
        <label for="senha">Senha: </label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" value=""><br>
        <label for="email">Email: </label>
        <input type="email" id="email" name="email" placeholder="Digite seu email"><br>
    </fieldset>

    <fieldset>
        <legend>Dados pessoais</legend>
        <label for="nome">nome: </label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br>

        <label for="nascimento">nascimento: </label>
        <input type="date" id="nascimento" name="nascimento"><br>

        <input for="idade">idade: </label>
        <input type="number" id="idade" name="idade" placeholder="Digite sua idade" value=""><br>

        <label for="brasileiro">Brasileiro: </label>
        <input type="radio" name="nacionalidade" id="brasileiro" value="brasileiro">
        <label for="estrangeiro">Estrangeiro: </label>
        <input type="radio" name="nacionalidade" id="estrangeiro" value="estrangeiro"><br>
    </fieldset>

    <fieldset>
        <legend>Cargo</legend>
        <label for="is_admin">Administrador </label>
        <input type="checkbox" id="is_admin" name="is_admin" value="is_admin"><br>
    </fieldset>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
    <button type="button" onclick="alert('Olá')">Clique aqui</button>

</form>

</body>
</html>
