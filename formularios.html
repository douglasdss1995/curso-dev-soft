<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>formulario</title>
</head>
<body>
<form action="/enviar" method="post">
  <label for="nome">Nome: </label>
  <input type="text" id="nome" name="nome" placeholder="Digite seu nome" value=""><br>

  <label for="senha">Senha: </label>
  <input type="password" id="senha" name="senha" placeholder="Digite sua senha"value=""><br>

  <label for="email">Email: </label>
  <input type="email" id="email" name="email" placeholder="Digite seu email"value=""><br>

  <label for="data de nascimento">Data de Nascimento: </label>
  <input type="date" id="data de nascimento" name="data de nascimento" placeholder="Digite sua idade"value=""><br>

  <label for="brasileiro">Brasileiro: </label>
  <input type="radio" id="brasileiro" name="nacionalidade" value="brasileiro"><br>
  <label for="estrangeiro">Estrangeiro: </label>
  <input type="radio" id="estrangeiro" name="nacionalidade" value="estrangeiro"><br>

  <label for="is_admin">Adiministrador? </label>
  <input type="checkbox" id="is_admin" name="is_admin" value=""><br>
<p></p>
  <label for="ENVIAR"></label>
  <input type="button" id="enviar" name="enviar" value="ENVIAR"><br>

</form>
</body>
</html>
