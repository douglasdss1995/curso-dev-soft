<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Login</title>
</head>
<body>
<h1>Formulário de Login</h1>
<fieldset>
    <legend>Informações de Login</legend>

<label for="name">Nome de Usuário:</label><br>
<input type="text" id="name" name="name" placeholder="Digite seu Nome" value="" required><br>
<label for="senha">Senha:</label><br>
<input type="password" id="senha" name="senha" placeholder="Digite sua Senha" value="" required>
</fieldset>
<button type="submit">Enviar</button>
<button type="reset">Cancelar</button>
</body>
</html>
