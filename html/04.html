<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Pesquisa de Satisfação</title>
</head>
<body>

<h1>Formulário de Pesquisa de Satisfação</h1>

<fieldset>
    <legend>Feedback Cliente</legend>
    <label for="number">Nota:</label>
    <input type="number" id="number" name="number" min="1" max="10" value="" required><br>

    <label for="anotacoes">Mensagem</label><br>
    <textarea id="anotacoes" name="anotacoes" rows="5" cols="30">
</textarea><br>

    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>

</fieldset>
</body>
</html>
