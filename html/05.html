<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Pedido (E-COMMERCE)</title>
</head>
<body>
<h1>Formulário de Pedido (E-COMMERCE)</h1>
<fieldset>
    <legend>Quantidade de Produtos</legend>
    <label for="quantidade">Qtd</label>
    <select name="quantidade" id="quantidade" required>
        <option value=""></option>
        <option value="quantidade">1</option>
        <option value="quantidade">2</option>
        <option value="quantidade">3</option>
        <option value="quantidade">4</option>
        <option value="quantidade">5</option>
    </select>
</fieldset>
<br>
<fieldset>
    <legend>Lista de Produtos</legend>
        <label for="produto">Lista</label>
        <select name="produto" id="produto" required>
            <option value=""></option>
            <option value="produto">Notebooks</option>
            <option value="produto">Mouses</option>
            <option value="produto">WebCam</option>
            <option value="produto">Teclados</option>
            <option value="produto">PenDrives</option>
        </select>
</fieldset>
<button type="submit">Enviar</button>
<button type="reset">Limpar</button>
<br>
</body>
</html>
