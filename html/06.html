<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Agendamento de Consulta</title>
</head>
<body>
<h2>Formulário de Agendamento de Consulta</h2>
<fieldset>
  <legend>Informações de Agendamento</legend>
<label for="number">Data</label>
<input type="date" id="data" name="data" required><br>
<label for="number">Hora</label>
<input type="time" id="hora" name="hora" required><br>

</fieldset>
<button type="submit">Enviar</button>
<button type="reset">Limpar</button>
</body>
</html>
