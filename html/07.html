<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Incrição em Newsletter</title>
</head>
<body>
<h2>Formulário de Inscrição em Newsletter</h2>
<fieldset>
  <div>
    <legend>Lista de E-Mails</legend>
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required><br>
    <input type="checkbox" id="scales" name="scales" checked>
    <label for="text"> Aceite os Termos</label>



  </div>
</fieldset>
<button type="submit">Enviar</button>
<button type="reset">Limpar</button>
</body>
</html>
