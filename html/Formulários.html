<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<fieldset>
    <legend>Informações de login</legend>
    <form action="/enviar" method="post">
        <!--Campos aqui-->

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha"><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" value=""><br>
</fieldset>

<fieldset>
    <legend>Informações pessoais</legend>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br>

    <label for="nascimento">Nascimento:</label>
    <input type="date" id="nascimento" name="nascimento" placeholder="Digite sau idade" value=""><br>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade" placeholder="Digite sua idade" value=""><br>

    <label for="brasileiro">Brasileiro:</label>
    <input type="radio" name="nacionalidade" id="brasileiro" value="brasileiro">
    <label for="estrangeiro">Estrangeiro:</label>
    <input type="radio" name="nacionalidade" id="estrangeiro" value="estrangeiro"><br>

    <label for="is_admin">Adminnistrador:</label>
    <input type="checkbox" id="is_admin" name="is_admin" value=""><br>

    <label>Cidade</label>
    <select name="Cidade">
        <option value="am">Manaus</option>
        <option value="sp">São paulo</option>
        <option value="ex">Exterior</option>
    </select><br>

</fieldset>

<fieldset>
    <legend>Informações sistema</legend>
    <label for="is_admin">Administrador</label>
    <input type="checkbox" id="is_admin" name="is_admin">
</fieldset>

<label for="anotacoes">Mensagem</label>
<textarea id="anotacoes" name="anotacoes" rows="5" cols="30">
    anotações
</textarea><br>


<button type="submit">Enviar</button>
<button type="reset">Limpar</button>
<button type="button" onclick="alert('Olá')">Clique aqui</button>
<br>


</form>
</body>
</html>
