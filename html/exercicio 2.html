<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
</head>
<body>

<h2>Cadastro de Usuário</h2>

<form>

    Nome: <input type="text" name="nome" required><br> required <br>
    E-mail: <input type="email" name="email" required><br> required <br>
    Senha: <input type="password" name="senha" required><br> required <br>
    Data de Nascimento: <input type="date" name="dataNascimento" required><br><br>

    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>

</form>
</body>
</html>
