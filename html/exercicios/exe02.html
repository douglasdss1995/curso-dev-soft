<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário Cadastro</title>
</head>
<body>
<form>
    <fieldset>
        <legend>Cadastro de Usuário</legend>
    <label for="usuario">Usuário: </label>
    <input type="text" name="nome" id="usuario" placeholder="Digite um usuário" required><br>
    <br>
    <label for="email">E-mail:</label>
    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required><br>
    <br>
    <label for="senha">Senha: </label>
    <input type=password id="senha" name="senha" placeholder="Digite Sua Senha" value="" required><br>
    <br>
    <label for="nascimento">Nascimento: </label>
    <input type="date" id="nascimento" name="nascimento" placeholder="Digite Sua Data de Nasc." value="" required><br>
    <br>
    </fieldset>
    <br>
    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>
</form>

</body>
</html>
