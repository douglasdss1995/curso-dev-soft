<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Inscrição em Newsletter</title>
</head>
<body bgcolor="#ed1722" text="#f0f8ff">
<header><img src="https://i0.wp.com/assets.b9.com.br/wp-content/uploads/2020/03/ifood.jpg?fit=1280%2C720&ssl=1" alt="ifood" width="120" height="90"><h1>Faça sua Inscrição: </h1></header>
<main>
  <form action="">
    <fieldset>
      <label for="email">Email: </label>
      <input type="email" id="email" name="email" required><br>
      <label for="termos">Aceita os Termos </label>
      <input type="checkbox" name="termos" id="termos" placeholder="Sim" required>
    </fieldset>
    <br>
    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>
  </form>
</main>
</body>
</html>
