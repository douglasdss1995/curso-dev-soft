<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Informações de contato</title>
</head>
<body>
<form action="/enviar" method="post">
<!--Formulário de Contato Básico-->

    <h1>Informações de Contato</h1>
    <fieldset>
        <legend>Informações do usuário</legend>

        <label for="nome">Usuário: </label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br>

        <label for="email">E-mail: </label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required><br>
    </fieldset>
    <br>

    <label for="anotacoes">Mensagem:</label><br>
    <textarea id="anotacoes" name="anotacoes" rows="4" cols="30"></textarea><br>

    <button type="submit">Enviar</button>
    <button type="reset">Cancelar</button>
</form>
</body>
</html>
