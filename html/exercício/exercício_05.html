<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="">

  <h1>Formulário de Pedido</h1>

  <fieldset>
    <legend>E-Commerce</legend>
    <label>Produtos</label>
      <select name="produtos" required>
        <option value="">Arroz</option>
        <option value="">Feijão</option>
        <option value="">Macarrão</option>
      </select><br>


    <label for="quantidade">Quantidade de produto:</label><br>
    <input type="number" id="quantidade" name="quantidade" min="1" max="3" required>


  </fieldset><br>

  <button type="submit">Enviar</button>
  <button type="reset">Cancelar</button>

</form>
</body>
</html>
