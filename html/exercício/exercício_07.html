<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="">

    <h1>Formulário de Incrição em Newsletter</h1>

    <fieldset>
      <legend><strong>INCRIÇÃO</strong></legend>
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required><br>

        <label for="is_admin">aceite os termos de compromisso</label>
        <input id="is_admin" name="is_admin" type="checkbox" required><br>

      <label for="admin">receber novidades</label>
      <input type="checkbox" id="admin" name="admin" required><br>
    </fieldset>

  <button type="submit">Enviar</button>
  <button type="reset">Cancelar</button>
</form>
</body>
</html>
