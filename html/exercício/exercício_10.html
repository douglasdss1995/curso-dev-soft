<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="">

    <h1>Formulário de Reclamação/Sugestão</h1>

    <fieldset>
        <legend>feedback do cliente</legend>

        <label for="reclamação">Reclamação:</label>
        <input type="radio" name="sg" id="reclamação" value="reclamação" required><br>

        <label for="sugestão">Sugestão:</label>
        <input type="radio" name="sg" id="sugestão" value="sugestão" required><br>

        <label for="mensagem"></label><br>
        <textarea id="mensagem" name="mensagem" rows="5" cols="30" placeholder="digite seu feedback"
                  required></textarea><br>

        <button type="submit">Reservar</button>
        <button type="reset">Cancelar</button>
  </form>
</body>
</html>
