<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>
</head>
<body>

<form action="/enviar" method="post">
    <fieldset>
        <legend>Informações de Login</legend>
        <label for="nome">Nome de Usuário: </label>
        <input type="text" name="nome" id="usuario" placeholder="Digite um usuário"><br>

        <label for="senha">Senha: </label>
        <input type=password id="senha" name="senha" placeholder="Digite Sua Senha" value=""><br>

        <label for="email">E-mail: </label>
        <input type="email" id="email" name="email" placeholder="Digite Sua E-mail" value=""><br>

    </fieldset>

    <fieldset>
        <legend>Informações Pessoais</legend>
        <label for="nome">Nome: </label>
        <input type="text" id="nome" name="nome" placeholder="Nome Completo" value=""><br>

        <label for="nascimento">Nascimento: </label>
        <input type="date" id="nascimento" name="nascimento" placeholder="Digite Sua Data de Nasc." value=""><br>

        <label for="idade">Idade: </label>
        <input type="number" id="idade" name="idade" placeholder="Digite sua idade" value=""><br>

        <label for="brasileiro">Brasileiro</label>
        <input type="radio" name="nacionalidade" id="brasileiro" value="brasileiro">
        <label for="estrangeiro">Estrangeiro</label>
        <input type="radio" name="nacionalidade" id="estrangeiro" value="estrangeiro"><br>

        <label>Cidade:</label>
        <select name="cidade">
            <option value="am">Manaus</option>
            <option value="sp">São Paulo</option>
            <option value="ex">Exterior</option>
        </select><br>

    </fieldset>
    <fieldset>
        <legend>Informações do Sistema</legend>
        <label for="is_admin">Administrador?</label>
        <input type="checkbox" id="is_admin" name="is_admin" value=""><br>
    </fieldset>

    <label for="anotacoes"> Mensagem: </label><br>
    <textarea name="anotacoes" id="anotacoes" cols="30" rows="5" placeholder="Digite sua anotação..."></textarea><br>

    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
    <button type="button" onclick="alert ('Olá')">Clique aqui</button>


</form>

</body>
</html>
