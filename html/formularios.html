<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Formulário com Fieldset</title>
</head>
<body>

<form action="/enviar" method="post">

  <fieldset>
    <legend>Informações Pessoais</legend>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" placeholder="Digite sua senha"><br>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="Digite seu e-mail"><br>


  </fieldset>

  <fieldset>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br>

    <label for="nascimento">Nascimento:</label>
    <input type="date" id="nascimento" name="nascimento"><br>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade" placeholder="Digite sua idade"><br>

      <legend>Nacionalidade</legend>

      <input type="radio" name="nacionalidade" id="brasileiro" value="brasileiro">
      <label for="brasileiro">Brasileiro</label><br>

      <input type="radio" name="nacionalidade" id="estrangeiro" value="estrangeiro">
      <label for="estrangeiro">Estrangeiro</label><br>

      <label for="cidade">Cidade:</label>
      <select name="cidade" id="cidade">
        <option value="am">Manaus</option>
        <option value="sp">São Paulo</option>
        <option value="ex">Exterior</option>
  </fieldset>

  <fieldset>

    <legend>Outras Informações</legend>

    <label for="is_admin">Administrador:</label>
    <input type="checkbox" id="is_admin" name="is_admin"><br>

    </select><br>

  </fieldset>

  <fieldset>

    <label for="anotacoes">Mensagem:</label><br>
    <textarea id="anotacoes" name="anotacoes" rows="5" cols="30" placeholder="Digite sua anotação..."></textarea><br>

  </fieldset>

  <button type="submit">Enviar</button>
  <button type="reset">Limpar</button>
  <button type="button" onclick="alert('Olá')">Clique aqui</button>

</form>

</body>
</html>
