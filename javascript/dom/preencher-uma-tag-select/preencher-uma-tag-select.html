<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preencher uma TAG SELECT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">

</head>

<body>
    <div class="container" id="app">
        <!--O conteudo vai ser criado via JavaScript-->
    </div>

    <script>
        //obter a referencia do container conde colocaremos os elementos
        const container = document.getElementById('app');

        //Criar  o label
        const label = document.createElement('label');
        label.htmlFor = 'frutas-select';
        label.textContent = 'Escolha uma fruta';
        label.style.fontWeight = 'bold';
        label.classList.add('form-label');
        label.classList.add('m-1');

        //criar o select 
        const select = document.createElement('select');
        select.id = 'frutas-select';
        select.className = 'form-select';

        //Lista de frutas
        const fruits = ['Maçã', 'Banana', 'Laranja', 'Uva', 'Abacaxi'];

        //Criar options e adicionar ao select
        fruits.forEach((fruit) => {
            const option = document.createElement('option');
            option.value = fruit.toLowerCase();
            option.textContent = fruit;
            select.appendChild(option);
        });

        container.appendChild(select);

        container.insertBefore(label, select);
    </script>

</body>

</html>
