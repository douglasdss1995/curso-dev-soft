<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
        
</head>
<body>
    <div class="container">
        <form action="" method="post">
    
            <div class="m-3">
                <label for="inputNumber" class="form-label">Número</label>
                <input type="text" class="form-control" name="inputNumber" id="inputNumber"
                    placeholder="Digite um número">
            </div>
    
    <h1 id="titleHello"></h1>
    
        </form>
    </div>
    
    <script>
    
        const inputNumber = document.getElementById('inputNumber');
    
        inputNumber.addEventListener('input', () => {
            const titleHello = document.getElementById('Ola');
            titleHello.textContent = `Olá ${inputNumber.value.trim()}`;
        });
    
    </script>
</body>
</html>
