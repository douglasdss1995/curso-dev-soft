<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous" />

</head>

<body>

    <div class="container">

        <h1 class="text-center">Cadastro de Eventos</h1>
        <div class="row">
            <div class="mt-2 col-12">
                <label for="text">Titulo</label><br>
                <input type="text" class="form-control" id="text" placeholder="Digite o título do evento" required>
            </div>

            <div class="mt-2 col-12">
                <label for="date">Data</label><br>
                <input type="date" class="form-control" id="data" placeholder="" value="bootstrap" required>
            </div>

            <div class="mt-2 col-12">
                <label for="local">Local</label><br>
                <input type="text" class="form-control" id="local" placeholder="Ex: Salão de festas" required>
            </div>
        </div>

        <div class="mt-3 col">
            <button type="submit" class="btn btn-danger">Cadastrar Evento</button>
        </div>
    </div>

    <hr class="my-3" />

    <h3 class="text-center">Eventos Cadastrados</h3>

    <div class="table-responsive">
        <table class="table table-striped table-bordered table-hover align-middle text-center" id="tabelaEventos">
            <table class="table table-striped table-bordered table-hover align-middle text-center" id="tabelaEventos">
            </table>
            <thead>
                <tr>
                    <th>Titulo</th>
                    <th>Data</th>
                    <th>Local</th>
                </tr>
            </thead>
        </table>
    </div>

</body>

</html>
