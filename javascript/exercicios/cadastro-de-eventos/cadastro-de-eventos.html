<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>

<body>
    <div class="container">
      <form id="form" novalidate>
        <h1 class="text-center mt-3">Cadastro de Evento</h1>

        <fieldset>
          <div class="row">
            <div class="mb-3 col-sm-12 col-md-6 col-lg-4">
              <label for="inputName" class="form-label">Título: </label>
              <input
                type="text"
                class="form-control"
                id="inputName"
                placeholder="Ex. Festa de Aniversário"
                required
              />
              <div class="invalid-feedback">Por favor, insira o nome do evento.</div>
            </div>

            <!--DIV da Data de Nascimento!-->

            <div class="mb-3 col-sm-12 col-md-6 col-lg-4">
                <label for="data" class="form-label">Data</label>
                <input
                 type="date" 
                 class="form-control"
                 id="nascimento"
                 placeholder="Data do Evento"
                 required
                 />
              <div class="invalid-feedback">Por favor, insira a data do Evento</div>
            </div>

            <!-- DIV dO Local -->

            <div class="mb-3 col-sm-12 col-md-6 col-lg-4">
              <label for="inputName" class="form-label">Local: </label>
              <input
                type="text"
                class="form-control"
                id="inputName"
                placeholder="Ex. Salão de Festas"
                required
              />
              <div class="invalid-feedback">Por favor, insira o nome do evento.</div>
            </div>
          </div>
        </fieldset>

        <div class="d-flex justify-content-center ">
          <!--<button type="reset" class="btn btn-warning col-6 col-md-3">
            Reset
          </button>-->
          
          <button type="submit" class="btn btn-danger w-100">
            Cadastrar Evento
          </button>
        </div>
      </form>

      <hr class="my-4" />

      <h3 class="text-center mb-3">Eventos Cadastrados</h3>

      <div class="table-responsive">
        <table
          class="table table-striped table-bordered table-hover align-middle text-center"
          id="tabelaUsuarios"
        >
          <thead class="table-white">
            <tr>
              <th>Título</th>
              <th>Data</th>
              <th>Local</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Itens cadastrados aparecerão aqui -->
          </tbody>
        </table>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>

    <script src="cadastro-de-eventos.js"></script>
  </body>
</html>
