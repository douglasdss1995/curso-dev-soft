<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous" />

    <link rel="stylesheet" href="cadastro-de-usuario.css">

</head>

<body>
    <div class="container">
        <form action="">
            <h1>Cadastro de Usuários</h1>

            <div class="row">
                <div class="col-sm-12 col-md-6 col-lg-4">
                    <label class="form-label" for="nome">Nome do Responsavel: </label>
                    <input type="text" name="nome" id="nome" class="form-control" placeholder="Digite seu nome"
                        required />
                </div>

                <div class="col-sm-12 col-md-6 col-lg-4">
                    <label class="form-label" for="email">E-mail: </label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="Digite seu e-mail"
                        required />
                </div>

                <div class="col-sm-12 col-md-6 col-lg-4">
                    <label class="form-label" for="tel">Telefone:</label>
                    <input type="tel" name="tel" id="tel" class="form-control" placeholder="Digite seu telefone"
                        required />
                </div>

                <div class="col-sm-12 col-md-6 col-lg-4">
                    <label class="form-label" for="tel">Nome do Evento:</label>
                    <input type="tel" name="tel" id="tel" class="form-control" placeholder="Digite o nome do evento"
                        required />
                </div>

                <div class="col-sm-12 col-md-6 col-lg-4">
                    <label class="form-label" for="tel">Local do Evento:</label>
                    <input type="tel" name="tel" id="tel" class="form-control" placeholder="Digite local do evento"
                        required />
                </div>

                <div class="col-sm-12 col-md-6 col-lg-4">
                    <label class="form-label" for="tel">Equipamentos Alugados:</label>
                    <select class="form-select" aria-label="Default select example">
                        <option selected>Equipamentos</option>
                        <option value="1">Estrutura</option>
                        <option value="2">Som</option>
                        <option value="3">Iluminação</option>
                        <option value="4">Painel de Led</option>
                    </select>

                    <div class="mt-3 d-flex justify-content-end">
                        <button type="button" class=" btn btn-secondary" >Cancelar</button>
                    
                        <button type="button" class="btn btn-primary">Colocar Equipamentos</button>
                    </div>

                </div>

            </div>

            <div class="mt-3 d-flex justify-content-end">
                <button type="button" class="btn btn-success">Cadastrar Evento</button>
            </div>
        </form>

        <hr />

        <table class="table table-striped table-hover table-bordered">
            <thead class="table-yellow text-center" id="table">
                <tr>
                    <th>Nome do Responsavel</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Nome do Evento</th>
                    <th>Local do Evento</th>
                    <th>Equipamentos Alugados</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>a</td>
                    <td>s</td>
                    <td>d</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="cadastro-de-usuario.js"></script>

</body>

</html>
