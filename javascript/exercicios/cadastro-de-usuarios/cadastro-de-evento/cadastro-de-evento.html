<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Como preencher uma tabela</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="cadastro-de-evento.css" />
  </head>

  <body>
    <div class="container">
      <form id="form" novalidate>
        <h1 class="text-center mt-3">Cadastro de Evento</h1>

        <fieldset>
          <div class="row">
            <div class="mb-3 col-sm-12 col-md-6 col-lg-4">
              <label for="inputTitulo" class="form-label">Título: </label>
              <input
                type="text"
                class="form-control"
                id="inputTitulo"
                placeholder="Digite o título do evento"
                required
              />
              <div class="invalid-feedback">Por favor, insira o titulo de seu evento.</div>
            </div>

            <div class="mb-3 col-sm-12 col-md-6 col-lg-4">
              <label for="inputData" class="form-label">Data:</label>
              <input
                type="data"
                class="form-control"
                id="inputData"
                placeholder="00/00/0000"
                required
              />
              <div class="invalid-feedback">
                Por favor, insira uma data válida
              </div>
            </div>

            <div class="mb-3 col-sm-12 col-md-6 col-lg-4">
              <label for="inputLocal" class="form-label">Local:</label>
              <input
                type="text"
                class="form-control"
                id="inputLocal"
                placeholder="Digite o local"
                required
              />
              <div class="invalid-feedback">
                Por favor, insira um local.
              </div>
            </div>
          </div>
        </fieldset>

        <div class="d-flex justify-content-end gap-1">
          <button type="submit" class="btn btn-primary col-12 col-md-12">
            Cadastrar Evento
          </button>
        </div>
      </form>

      <hr class="my-4" />

      <h3 class="text-center mb-3">Eventos Cadastrados</h3>

      <div class="table-responsive">
        <table
          class="table table-striped table-bordered table-hover align-middle text-center"
          id="tabelaUsuarios"
        >
          <thead class="table">
            <tr>
              <th>Título</th>
              <th>Data</th>
              <th>Local</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Itens cadastrados aparecerão aqui -->
          </tbody>
        </table>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>

    <script src="cadastro-de-evento.js"></script>
  </body>
</html>
