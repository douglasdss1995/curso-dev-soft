<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Tabela</title>

            </tr>
            <tr>
                <th>João</th>

                <td colspan="2">

                    4
                </td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
